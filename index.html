<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="calculator" role="application" aria-label="Calculator">
  <div class="brand">Golden Calc</div>

  <div class="display" aria-live="polite" aria-atomic="true">
    <div class="expression" id="expression"></div>
    <div class="current" id="current">0</div>
  </div>

  <div class="keys">
    <button class="key key--fn" data-action="clear" aria-label="Clear">C</button>
    <button class="key key--fn" data-action="backspace" aria-label="Backspace">⌫</button>
    <button class="key key--fn" data-action="percent" aria-label="Percent">%</button>
    <button class="key key--op" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

    <button class="key key--digit" data-action="digit" data-value="7" aria-label="7">7</button>
    <button class="key key--digit" data-action="digit" data-value="8" aria-label="8">8</button>
    <button class="key key--digit" data-action="digit" data-value="9" aria-label="9">9</button>
    <button class="key key--op" data-action="operator" data-value="×" aria-label="Multiply">×</button>

    <button class="key key--digit" data-action="digit" data-value="4" aria-label="4">4</button>
    <button class="key key--digit" data-action="digit" data-value="5" aria-label="5">5</button>
    <button class="key key--digit" data-action="digit" data-value="6" aria-label="6">6</button>
    <button class="key key--op" data-action="operator" data-value="−" aria-label="Subtract">−</button>

    <button class="key key--digit" data-action="digit" data-value="1" aria-label="1">1</button>
    <button class="key key--digit" data-action="digit" data-value="2" aria-label="2">2</button>
    <button class="key key--digit" data-action="digit" data-value="3" aria-label="3">3</button>
    <button class="key key--op" data-action="operator" data-value="+" aria-label="Add">+</button>

    <button class="key key--digit key--zero" data-action="digit" data-value="0" aria-label="0">0</button>
    <button class="key key--digit" data-action="decimal" aria-label="Decimal point">.</button>
    <button class="key key--eq" data-action="equals" aria-label="Equals">=</button>
  </div>
</div>

<script src="calculator.js"></script>
</body>
</html>
